<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flutter Web Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 15px; border-radius: 5px; margin: 10px 0; border-left: 4px solid #0066cc; }
        .error { border-left-color: #cc0000; color: #cc0000; }
        .success { border-left-color: #00cc00; color: #00cc00; }
        .info { border-left-color: #0066cc; color: #0066cc; }
    </style>
</head>
<body>
    <h1>🔍 Flutter Web Debug Console</h1>
    
    <div class="box info">
        <strong>📍 URL:</strong> <span id="url"></span>
    </div>
    
    <div class="box info">
        <strong>🌐 Browser:</strong> <span id="browser"></span>
    </div>
    
    <div class="box info">
        <strong>📱 Platform:</strong> <span id="platform"></span>
    </div>
    
    <h2>📋 Test Kết Nối</h2>
    
    <div class="box">
        <button onclick="testConnection()">Test Supabase Connection</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        // Thông tin cơ bản
        document.getElementById('url').textContent = window.location.href;
        document.getElementById('browser').textContent = navigator.userAgent;
        document.getElementById('platform').textContent = navigator.platform;
        
        // Kiểm tra file
        async function testConnection() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            
            // Test 1: Kiểm tra main.dart.js
            addLog('Test 1: Checking main.dart.js...', 'info');
            try {
                const response = await fetch('main.dart.js');
                if (response.ok) {
                    addLog('✓ main.dart.js found (size: ' + response.headers.get('content-length') + ' bytes)', 'success');
                } else {
                    addLog('✗ main.dart.js returned status: ' + response.status, 'error');
                }
            } catch (e) {
                addLog('✗ Error checking main.dart.js: ' + e, 'error');
            }
            
            // Test 2: Kiểm tra flutter.js
            addLog('Test 2: Checking flutter.js...', 'info');
            try {
                const response = await fetch('flutter.js');
                if (response.ok) {
                    addLog('✓ flutter.js found', 'success');
                } else {
                    addLog('✗ flutter.js returned status: ' + response.status, 'error');
                }
            } catch (e) {
                addLog('✗ Error checking flutter.js: ' + e, 'error');
            }
            
            // Test 3: Kiểm tra manifest
            addLog('Test 3: Checking manifest.json...', 'info');
            try {
                const response = await fetch('manifest.json');
                if (response.ok) {
                    addLog('✓ manifest.json found', 'success');
                } else {
                    addLog('✗ manifest.json returned status: ' + response.status, 'error');
                }
            } catch (e) {
                addLog('✗ Error checking manifest.json: ' + e, 'error');
            }
            
            addLog('Tests completed!', 'info');
        }
        
        function addLog(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'box ' + type;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Auto test on load
        window.addEventListener('load', () => {
            addLog('Page loaded successfully', 'success');
        });
    </script>
</body>
</html>
